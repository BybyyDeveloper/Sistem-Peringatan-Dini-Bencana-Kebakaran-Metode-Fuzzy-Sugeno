<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — IoT Fire Detection</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="background:#0F172A;">

<div id="loading-screen">
  <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#ef4444,#f97316);display:flex;align-items:center;justify-content:center;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>
  <svg class="animate-spin w-5 h-5 mt-2" style="color:#f87171;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
  <p style="color:rgba(255,255,255,0.4);font-size:14px;">Memuat sistem...</p>
</div>

<!-- Access denied panel (hidden by default) -->
<div id="access-denied" class="hidden min-h-screen flex items-center justify-center">
  <div class="text-center">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" style="margin:0 auto 12px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <p class="text-white font-semibold">Akses Ditolak</p>
    <p style="color:rgba(255,255,255,0.4);font-size:14px;margin-top:4px;">Hanya admin yang dapat mengakses halaman ini</p>
  </div>
</div>

<aside id="sidebar"></aside>

<main id="main-content" class="p-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-white text-2xl font-bold">Admin Panel</h1>
      <p id="user-count" style="color:rgba(255,255,255,0.4);font-size:14px;margin-top:2px;">0 pengguna terdaftar</p>
    </div>
    <button onclick="openAdd()" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Tambah User
    </button>
  </div>

  <div id="admin-msg" class="hidden rounded-xl px-4 py-3 text-sm flex items-center gap-2" style="border:1px solid;"></div>

  <div class="glass overflow-hidden">
    <div class="overflow-x-auto">
      <table>
        <thead>
          <tr><th>Nama</th><th>Email</th><th>Role</th><th>Status</th><th>Login Terakhir</th><th>Aksi</th></tr>
        </thead>
        <tbody id="admin-tbody">
          <tr><td colspan="6" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px;">Tidak ada pengguna</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal tambah/edit user -->
<div id="user-modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-5">
      <h3 id="modal-title" class="text-white font-semibold">Tambah User Baru</h3>
      <button onclick="closeModal()" style="color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="space-y-3">
      <div>
        <label style="color:rgba(255,255,255,0.4);font-size:12px;display:block;margin-bottom:6px;">Nama Lengkap</label>
        <input id="m-nama" type="text" class="inp" />
      </div>
      <div id="m-email-wrap">
        <label style="color:rgba(255,255,255,0.4);font-size:12px;display:block;margin-bottom:6px;">Email</label>
        <input id="m-email" type="email" class="inp" />
      </div>
      <div id="m-pass-wrap">
        <label style="color:rgba(255,255,255,0.4);font-size:12px;display:block;margin-bottom:6px;">Password (min. 6 karakter)</label>
        <input id="m-pass" type="password" class="inp" />
      </div>
      <div>
        <label style="color:rgba(255,255,255,0.4);font-size:12px;display:block;margin-bottom:6px;">Role</label>
        <select id="m-role" class="inp">
          <option value="user">Pengguna</option>
          <option value="petugas">Petugas</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
      <div id="modal-err" class="hidden text-xs rounded-xl px-3 py-2" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;"></div>
      <button onclick="saveUser()" id="modal-save-btn" class="btn-primary w-full justify-center mt-1">
        <svg id="modal-spin" class="hidden animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span id="modal-save-txt">Simpan</span>
      </button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/fuzzy.js"></script>
<script src="js/common.js"></script>
<script>
let users = {}, editUid = null;

const ROLE_STYLE = {
  admin:   "color:#f87171;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);",
  petugas: "color:#fb923c;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);",
  user:    "color:#60a5fa;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);",
};

function showMsg(text, type="ok") {
  const el = document.getElementById("admin-msg");
  el.textContent = text;
  if (type==="ok") { el.style.background="rgba(16,185,129,0.1)"; el.style.borderColor="rgba(16,185,129,0.2)"; el.style.color="#34d399"; }
  else             { el.style.background="rgba(239,68,68,0.1)";  el.style.borderColor="rgba(239,68,68,0.2)";  el.style.color="#f87171"; }
  el.classList.remove("hidden");
  setTimeout(()=>el.classList.add("hidden"),3000);
}

function renderTable() {
  const arr = Object.values(users);
  document.getElementById("user-count").textContent = `${arr.length} pengguna terdaftar`;
  const tbody = document.getElementById("admin-tbody");
  if (!arr.length) {
    tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px;">Tidak ada pengguna</td></tr>`;
    return;
  }
  tbody.innerHTML = arr.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#f97316);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;">
            ${(u.nama||"U").charAt(0).toUpperCase()}
          </div>
          <span style="color:#fff;font-weight:500;">${u.nama||"-"}</span>
        </div>
      </td>
      <td style="color:rgba(255,255,255,0.6);">${u.email||"-"}</td>
      <td><span style="padding:2px 10px;border-radius:8px;font-size:11px;font-weight:500;${ROLE_STYLE[u.role]||''}">${u.role||"-"}</span></td>
      <td><span style="padding:2px 10px;border-radius:8px;font-size:11px;font-weight:500;${u.aktif?'color:#34d399;background:rgba(16,185,129,0.1);':'color:#f87171;background:rgba(239,68,68,0.1);'}">${u.aktif?"Aktif":"Nonaktif"}</span></td>
      <td style="color:rgba(255,255,255,0.4);font-size:12px;">${u.loginTerakhir?new Date(u.loginTerakhir).toLocaleString("id-ID"):"-"}</td>
      <td>
        <div style="display:flex;gap:4px;">
          <button onclick="openEdit('${u.uid}')" title="Edit" style="padding:6px;border-radius:8px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='#fff'" onmouseout="this.style.background='none';this.style.color='rgba(255,255,255,0.4)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button onclick="resetPass('${u.uid}')" title="Reset Password" style="padding:6px;border-radius:8px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='#fff'" onmouseout="this.style.background='none';this.style.color='rgba(255,255,255,0.4)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.08-1"/></svg>
          </button>
          <button onclick="toggleAktif('${u.uid}')" title="${u.aktif?'Nonaktifkan':'Aktifkan'}" style="padding:6px;border-radius:8px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='${u.aktif?'#f87171':'#34d399'}'" onmouseout="this.style.background='none';this.style.color='rgba(255,255,255,0.4)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `).join("");
}

function openAdd() {
  editUid=null;
  document.getElementById("modal-title").textContent="Tambah User Baru";
  document.getElementById("m-nama").value="";
  document.getElementById("m-email").value="";
  document.getElementById("m-pass").value="";
  document.getElementById("m-role").value="user";
  document.getElementById("m-email-wrap").classList.remove("hidden");
  document.getElementById("m-pass-wrap").classList.remove("hidden");
  document.getElementById("modal-err").classList.add("hidden");
  document.getElementById("user-modal").classList.remove("hidden");
}

function openEdit(uid) {
  const u = users[uid];
  if (!u) return;
  editUid=uid;
  document.getElementById("modal-title").textContent="Edit User";
  document.getElementById("m-nama").value=u.nama||"";
  document.getElementById("m-email").value=u.email||"";
  document.getElementById("m-role").value=u.role||"user";
  document.getElementById("m-email-wrap").classList.add("hidden");
  document.getElementById("m-pass-wrap").classList.add("hidden");
  document.getElementById("modal-err").classList.add("hidden");
  document.getElementById("user-modal").classList.remove("hidden");
}

function closeModal() { document.getElementById("user-modal").classList.add("hidden"); }

async function saveUser() {
  const nama  = document.getElementById("m-nama").value.trim();
  const email = document.getElementById("m-email").value.trim();
  const pass  = document.getElementById("m-pass").value;
  const role  = document.getElementById("m-role").value;
  const errEl = document.getElementById("modal-err");
  const btn   = document.getElementById("modal-save-btn");
  const spin  = document.getElementById("modal-spin");
  const txt   = document.getElementById("modal-save-txt");
  errEl.classList.add("hidden");
  btn.disabled=true; spin.classList.remove("hidden"); txt.textContent="Menyimpan...";
  try {
    if (editUid) {
      await db.ref(`users/${editUid}`).update({ nama, role });
      showMsg("User berhasil diperbarui");
    } else {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await db.ref(`users/${cred.user.uid}`).set({ uid:cred.user.uid, email, nama, role, aktif:true });
      if (_currentUser) await logActivity(_currentUser.uid, `Tambah User: ${email}`);
      showMsg("User berhasil ditambahkan");
    }
    closeModal();
  } catch(e) {
    const msgs={"auth/email-already-in-use":"Email sudah digunakan"};
    errEl.textContent=msgs[e.code]||"Gagal menyimpan: "+e.message;
    errEl.classList.remove("hidden");
  } finally { btn.disabled=false; spin.classList.add("hidden"); txt.textContent="Simpan"; }
}

async function toggleAktif(uid) {
  const u=users[uid]; if(!u) return;
  await db.ref(`users/${uid}`).update({ aktif: !u.aktif });
  showMsg(`User ${!u.aktif?"diaktifkan":"dinonaktifkan"}`);
}

async function resetPass(uid) {
  const u=users[uid]; if(!u) return;
  await auth.sendPasswordResetEmail(u.email);
  showMsg(`Link reset dikirim ke ${u.email}`);
}

requireAuth((profile) => {
  if (profile.role !== "admin") {
    document.getElementById("main-content").classList.add("hidden");
    document.getElementById("access-denied").classList.remove("hidden");
    return;
  }
  db.ref("users").on("value", snap => {
    if (!snap.exists()) { users={}; renderTable(); return; }
    users = snap.val();
    renderTable();
  });
});
</script>
</body>
</html>
